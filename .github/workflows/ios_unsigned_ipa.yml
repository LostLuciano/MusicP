name: iOS Unsigned IPA Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Unsigned iOS App Bundle
        run: |
          cd flutter_app
          flutter build ios --release --no-codesign

      - name: Package App into Unsigned IPA
        run: |
          cd flutter_app
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r MusicStemStudio_unsigned.ipa Payload

      - name: Upload Unsigned IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: MusicStemStudio_unsigned_ipa
          path: flutter_app/build/ios/iphoneos/MusicStemStudio_unsigned.ipa
