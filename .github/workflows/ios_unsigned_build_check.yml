name: iOS Unsigned Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ios-check:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Build Unsigned iOS Bundle
        run: |
          cd flutter_app
          flutter build ios --release --no-codesign
