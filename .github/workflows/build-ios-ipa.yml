name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:       # Allows manual trigger from GitHub UI

jobs:
  build-ios:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true        # Pull Git LFS files (models, audio assets)

      # ── 2. Java (needed by Flutter/Gradle toolchain) ─────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Flutter SDK ───────────────────────────────────────────────────
      #   Local dev uses Flutter 3.41.6 / Dart 3.11.4
      #   pubspec.yaml sdk constraint: ^3.11.4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'           # Always latest stable (no version pin)
          cache: true

      - name: Print Flutter & Dart version
        run: flutter --version

      # ── 4. Install Dart/Flutter dependencies ─────────────────────────────
      - name: flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      # ── 5. Run Dart Analyzer (non-fatal warnings OK) ─────────────────────
      - name: flutter analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos || true

      # ── 6. Install CocoaPods ─────────────────────────────────────────────
      - name: Install CocoaPods & pod install
        working-directory: flutter_app/ios
        run: |
          gem install cocoapods --no-document
          pod install --repo-update

      # ── 7. Build iOS release (no code signing) ───────────────────────────
      #   flutter build ios --no-codesign produces a Release .app in
      #   flutter_app/build/ios/iphoneos/Runner.app
      - name: Build iOS archive (unsigned)
        working-directory: flutter_app
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=FLUTTER_BUILD_NAME=1.0.0 \
            --dart-define=FLUTTER_BUILD_NUMBER=${{ github.run_number }}

      # ── 8. Package .app → .ipa (Payload zip method) ──────────────────────
      - name: Package unsigned IPA
        shell: bash
        run: |
          set -e
          APP_PATH="flutter_app/build/ios/iphoneos/Runner.app"
          IPA_NAME="MusicStemStudio_unsigned_build${{ github.run_number }}.ipa"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "$IPA_NAME" Payload/
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV
          echo "✅ IPA created: $IPA_NAME ($(du -sh "$IPA_NAME" | cut -f1))"

      # ── 9. Upload IPA as downloadable artifact ────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicStemStudio-IPA-unsigned-build${{ github.run_number }}
          path: ${{ env.IPA_NAME }}
          retention-days: 30

      # ── 10. Upload dSYMs for crash symbolication (optional) ──────────────
      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicStemStudio-dSYMs-build${{ github.run_number }}
          path: flutter_app/build/ios/iphoneos/**/*.dSYM
          retention-days: 14
          if-no-files-found: ignore
