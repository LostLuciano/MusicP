name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          cd flutter_app
          flutter pub get

      - name: Check Formatting
        run: |
          cd flutter_app
          dart format --set-exit-if-changed lib test

      - name: Analyze Code
        run: |
          cd flutter_app
          flutter analyze

      - name: Run Unit & Widget Tests
        run: |
          cd flutter_app
          flutter test
